<div class="onboarding-container">

  <div class="onboarding-card">

    <h1>Welcome to FocusFlow</h1>

    <p>
      Let's personalize your workspace
    </p>

    <div class="form-group">

      <label>Name</label>

      <input
        type="text"
        [(ngModel)]="name"
      />

    </div>

    <div class="form-group">

      <label>City</label>

      <input
        type="text"
        [(ngModel)]="city"
      />

    </div>

    <button
      (click)="saveSetup()"
    >
      Continue
    </button>

  </div>

</div>
