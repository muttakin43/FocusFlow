<div class="task-item" [class.completed]="task.completed">

  <mat-checkbox
    [checked]="task.completed"
    (change)="onToggle()">
  </mat-checkbox>

  <div class="task-content">

    <div class="task-header">
      <h4 class="task-title"
          [class.strikethrough]="task.completed">
        {{ task.title }}
      </h4>
    </div>
    

    <div class="task-meta">

      <span class="priority-tag" [ngClass]="task.priority">
        {{ task.priority | titlecase }}
      </span>

      <span class="meta-item">
        <mat-icon>schedule</mat-icon>
        {{ task.dueTime }}
      </span>

      <span class="meta-item">
        <mat-icon>event</mat-icon>
         {{ task.dueDate | date:'dd MMM yyyy' }}
      </span>

    </div>

    <div class="task-tags" *ngIf="task.tags.length">
      <span
        class="tag"
        *ngFor="let tag of task.tags">
        #{{ tag }}
      </span>
    </div>

    <p
      class="task-notes"
      *ngIf="task.notes">
     Description
     : {{ task.notes }}
    </p>

  </div>
 <div class="task-actions">

    <button
      class="action-btn edit-btn"
      (click)="onEdit()">

      Edit

    </button>

    <button
      class="action-btn delete-btn"
      (click)="onDelete()">

      Delete

    </button>

  </div>
</div>
